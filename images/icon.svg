<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background: rounded rect, gray fill, subtle border -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24"
        fill="#222222" stroke="#444444" stroke-width="2"/>

  <!-- Skill graph: 5 nodes connected in a hub-and-spoke pattern -->
  <!-- Center node -->
  <circle cx="64" cy="64" r="9" fill="#ebebeb"/>
  <!-- Spoke lines -->
  <line x1="64" y1="64" x2="64"  y2="30"  stroke="#b0b0b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="97"  y2="47"  stroke="#b0b0b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="87"  y2="90"  stroke="#b0b0b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="41"  y2="90"  stroke="#b0b0b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="31"  y2="47"  stroke="#b0b0b8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="64"  cy="30" r="6" fill="#d0d0d8"/>
  <circle cx="97"  cy="47" r="6" fill="#d0d0d8"/>
  <circle cx="87"  cy="90" r="6" fill="#d0d0d8"/>
  <circle cx="41"  cy="90" r="6" fill="#d0d0d8"/>
  <circle cx="31"  cy="47" r="6" fill="#d0d0d8"/>
</svg>
